<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║            OSCAHS TRAINING LIBRARY — SETUP GUIDE                 ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║                                                                  ║
  ║  All videos are configured in the VIDEOS array at the top of    ║
  ║  the <script> tag — it's clearly marked. To add a new video:    ║
  ║                                                                  ║
  ║  1. Upload the .mp4 to Dropbox and get its share link           ║
  ║  2. Change ?dl=0 → ?raw=1 at the end of that URL               ║
  ║  3. Copy an existing entry in the VIDEOS array and update       ║
  ║     title, description, url, and chapters                       ║
  ║                                                                  ║
  ║  To add subtitles to a video:                                   ║
  ║  1. Create a .vtt file (WebVTT format — see below)             ║
  ║  2. Upload it to Dropbox and get its share link                 ║
  ║  3. Change ?dl=0 → ?raw=1 and add  subtitles: "<url>"          ║
  ║     to the video entry                                          ║
  ║                                                                  ║
  ║  WebVTT format: the file must start with "WEBVTT" on line 1,   ║
  ║  then each cue is: start time, space, two dashes and a         ║
  ║  greater-than sign, space, end time — then the caption text.   ║
  ║  Times use HH:MM:SS.mmm notation. Save with a .vtt extension.  ║
  ║                                                                  ║
  ║  Chapter timestamps are in seconds, or use "MM:SS" strings.     ║
  ║                                                                  ║
  ║  Staff access: share this .html file via Dropbox. Staff with    ║
  ║  Dropbox desktop open it directly from their synced folder.     ║
  ║  Others download it once and open it in any browser.            ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oscahs Training Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── BRAND TOKENS ─────────────────────────────────────────────── */
    :root {
      --primary:    #E91E63;
      --primary-dim:#fce4ec;
      --secondary:  #FF9800;
      --accent:     #8BC34A;
      --info:       #00BCD4;
      --purple:     #9C27B0;
      --bg:         #FFFDF5;
      --surface:    #FFFFFF;
      --surface2:   #F4F2EB;
      --text:       #2D2B3F;
      --text-muted: #9CA3AF;
      --border:     #E5E7EB;
      --radius:     14px;
      --radius-sm:  8px;
      --shadow:     0 4px 24px rgba(0,0,0,0.08);
      --shadow-card:0 2px 12px rgba(0,0,0,0.07);
    }
    [data-theme="dark"] {
      --bg:         #1F1D2B;
      --surface:    #2D2B3F;
      --surface2:   #252336;
      --text:       #F3F4F6;
      --text-muted: #6B7280;
      --border:     #3D3B52;
      --primary-dim:rgba(233,30,99,0.18);
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
      --shadow-card:0 2px 12px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ── VIEWS ───────────────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── SHARED HEADER ───────────────────────────────────────────── */
    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hdr-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .logo img {
      height: 34px;
      width: auto;
      display: block;
    }
    .hdr-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }
    .hdr-title {
      font-family: "Fredoka", sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .hdr-spacer { flex: 1; }
    .hdr-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: all .2s;
    }
    .hdr-btn:hover { background: var(--primary-dim); color: var(--primary); border-color: var(--primary); }
    .hdr-btn svg { width: 17px; height: 17px; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: .45rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-family: "Nunito", sans-serif;
      font-size: .85rem;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: all .15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--primary); background: var(--primary-dim); }
    .back-btn svg { width: 18px; height: 18px; }

    /* ── HOME — HERO ─────────────────────────────────────────────── */
    .home-hero {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 2.25rem 1.5rem 2rem;
      text-align: center;
    }
    .home-hero h1 {
      font-family: "Fredoka", sans-serif;
      font-size: 1.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .35rem;
    }
    .home-hero p {
      color: var(--text-muted);
      font-size: .9rem;
    }

    /* ── HOME — GRID ─────────────────────────────────────────────── */
    .library {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    .library-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* Video card */
    .v-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      cursor: pointer;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      display: flex;
      flex-direction: column;
    }
    .v-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      border-color: var(--primary);
    }
    .v-card-thumb {
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%);
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    [data-theme="dark"] .v-card-thumb {
      background: linear-gradient(135deg, #3d1a29 0%, #2d1320 100%);
    }
    .v-card-thumb .thumb-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .3s;
    }
    .v-card-thumb .thumb-video.ready { opacity: 1; }
    .v-card-thumb .play-circle {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(233,30,99,0.4);
      transition: transform .2s;
    }
    .v-card:hover .play-circle { transform: scale(1.1); }
    .v-card-thumb .play-circle svg { width: 26px; height: 26px; color: #fff; margin-left: 3px; }
    .v-card-thumb .ch-pill {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,.6);
      color: #fff;
      font-size: .68rem;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 99px;
      backdrop-filter: blur(4px);
    }
    .v-card-body {
      padding: 1rem 1.1rem 1.1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .35rem;
    }
    .v-card-title {
      font-family: "Fredoka", sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }
    .v-card-desc {
      font-size: .8rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── PLAYER VIEW ─────────────────────────────────────────────── */
    .player-app {
      display: flex;
      height: calc(100vh - 64px);
      overflow: hidden;
    }

    /* Video panel */
    .video-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: #111;
    }
    .video-wrap {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .video-loader {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .video-loader.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .video-loader .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      cursor: pointer;
    }

    /* Controls */
    .controls {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .45rem 1.1rem .65rem;
      flex-shrink: 0;
    }
    .progress-wrap {
      height: 22px;
      display: flex;
      align-items: center;
      cursor: pointer;
      margin-bottom: .35rem;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }
    .progress-track {
      position: relative;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      transition: height .1s;
    }
    .progress-wrap:hover .progress-track { height: 6px; }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      pointer-events: none;
      width: 0%;
    }
    .progress-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      transform: translate(-50%,-50%) scale(.8);
      width: 14px; height: 14px;
      background: var(--primary);
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px var(--primary);
      pointer-events: none;
      transition: transform .15s;
    }
    .progress-wrap:hover .progress-thumb,
    .progress-wrap.dragging .progress-thumb { transform: translate(-50%,-50%) scale(1); }
    .ch-tick {
      position: absolute;
      top: 50%;
      transform: translate(-50%,-50%);
      width: 3px; height: 11px;
      background: var(--secondary);
      border-radius: 2px;
      pointer-events: none;
      z-index: 2;
    }
    .ch-tick-tip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.8);
      color: #fff;
      font-size: .7rem;
      font-family: "Nunito", sans-serif;
      padding: 2px 7px;
      border-radius: 5px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s;
      z-index: 10;
    }
    .ch-tick:hover .ch-tick-tip { opacity: 1; }
    .time-preview {
      position: absolute;
      bottom: calc(100% + 10px);
      background: rgba(0,0,0,.72);
      color: #fff;
      font-size: .7rem;
      font-family: "Nunito", sans-serif;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 5px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .1s;
      white-space: nowrap;
      transform: translateX(-50%);
    }
    .progress-wrap:hover .time-preview { opacity: 1; }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .ctrl-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text); padding: 4px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .ctrl-btn:hover { color: var(--primary); background: var(--primary-dim); }
    .ctrl-btn.active { color: var(--primary); background: var(--primary-dim); }
    .ctrl-btn svg { width: 22px; height: 22px; pointer-events: none; }
    .ctrl-btn.play-btn svg { width: 28px; height: 28px; }

    video::cue {
      background: rgba(0,0,0,0.78);
      color: #ffffff;
      font-family: "Nunito", sans-serif;
      font-size: .95em;
    }

    .vol-group { display: flex; align-items: center; gap: 3px; }
    .vol-slider {
      -webkit-appearance: none;
      width: 70px; height: 4px;
      border-radius: 99px; background: var(--border);
      outline: none; cursor: pointer;
    }
    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--primary); cursor: pointer;
    }
    .vol-slider::-moz-range-thumb {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--primary); border: none; cursor: pointer;
    }
    .time-disp {
      font-size: .78rem; font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted); white-space: nowrap; margin-left: 2px;
    }
    .spacer { flex: 1; }

    .ch-mob-btn {
      display: none; align-items: center; gap: 5px;
      background: var(--primary-dim); border: 1px solid var(--primary);
      color: var(--primary); font-family: "Nunito", sans-serif;
      font-size: .76rem; font-weight: 800;
      padding: 4px 11px; border-radius: 99px; cursor: pointer; white-space: nowrap;
    }
    .ch-mob-btn svg { width: 14px; height: 14px; }

    .speed-sel {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 3px 5px;
      font-family: "Nunito", sans-serif; font-size: .75rem; font-weight: 800;
      cursor: pointer; outline: none;
    }

    /* Chapters panel */
    .chapters-panel {
      width: 288px; flex-shrink: 0;
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .ch-hdr {
      padding: .9rem 1.1rem .7rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .ch-hdr h2 {
      font-family: "Fredoka", sans-serif; font-size: 1.05rem; font-weight: 600;
    }
    .ch-badge {
      background: var(--primary-dim); color: var(--primary);
      font-size: .72rem; font-weight: 800;
      padding: 2px 9px; border-radius: 99px;
    }
    .ch-list {
      flex: 1; overflow-y: auto; padding: .4rem;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .ch-list::-webkit-scrollbar { width: 4px; }
    .ch-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .ch-item {
      display: flex; align-items: flex-start; gap: .65rem;
      padding: .6rem .7rem; border-radius: var(--radius-sm);
      cursor: pointer; border: 1px solid transparent; transition: all .15s;
    }
    .ch-item:hover { background: var(--primary-dim); }
    .ch-item.active { background: var(--primary-dim); border-color: rgba(233,30,99,.35); }
    .ch-n {
      font-size: .68rem; font-weight: 800; color: var(--text-muted);
      padding-top: 2px; min-width: 16px; text-align: right;
    }
    .ch-item.active .ch-n { color: var(--primary); }
    .ch-body { flex: 1; min-width: 0; }
    .ch-name { font-size: .84rem; font-weight: 700; line-height: 1.3; color: var(--text); }
    .ch-item.active .ch-name { color: var(--primary); }
    .ch-ts { font-size: .72rem; color: var(--text-muted); font-variant-numeric: tabular-nums; margin-top: 1px; }
    .ch-play-icon {
      display: none; width: 13px; height: 13px;
      color: var(--primary); flex-shrink: 0; margin-top: 3px;
    }
    .ch-item.active .ch-play-icon { display: block; }

    .ch-empty {
      padding: 1.75rem 1rem; text-align: center; color: var(--text-muted);
    }
    .ch-empty svg { width: 36px; height: 36px; margin: 0 auto .6rem; opacity: .4; display: block; }
    .ch-empty p { font-size: .82rem; line-height: 1.5; }

    /* ── TOAST ────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--primary); color: #fff;
      padding: .52rem 1.2rem; border-radius: 99px;
      font-size: .82rem; font-weight: 700; z-index: 9998;
      pointer-events: none; opacity: 0;
      transition: opacity .25s, transform .25s;
      box-shadow: 0 4px 20px rgba(0,0,0,.25); white-space: nowrap;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: #ef4444; }

    /* ── RESPONSIVE ───────────────────────────────────────────────── */
    @media (max-width: 760px) {
      .player-app { flex-direction: column; height: auto; overflow: visible; }
      .video-panel { height: auto; }
      .video-wrap { aspect-ratio: 16/9; flex: none; height: auto; }
      .chapters-panel {
        width: 100%; flex-shrink: 0; border-left: none;
        border-top: 1px solid var(--border); max-height: 280px;
      }
      .ch-mob-btn { display: flex; }
    }
    @media (max-width: 500px) {
      .hdr-inner { padding: 0 1rem; }
      .library { padding: 1.25rem 1rem 2rem; }
      .controls { padding: .4rem .75rem .6rem; }
      .speed-sel { display: none; }
      .home-hero { padding: 1.5rem 1rem 1.25rem; }
      .home-hero h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     HOME VIEW
═══════════════════════════════════════════════════════════ -->
<div id="homeView" class="view active">

<script>
let VIDEOS = [];
const { invoke, convertFileSrc } = window.__TAURI__.core;


// ── ELEMENT REFS ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const homeView      = $("homeView");
const playerView    = $("playerView");
const libraryGrid   = $("libraryGrid");
const backBtn       = $("backBtn");
const playerTitle   = $("playerTitle");
const video         = $("video");
const playBtn       = $("playBtn");
const iconPlay      = $("iconPlay");
const iconPause     = $("iconPause");
const muteBtn       = $("muteBtn");
const volSvg        = $("volSvg");
const volSlider     = $("volSlider");
const timeDsp       = $("timeDsp");
const progressWrap  = $("progressWrap");
const progressTrack = $("progressTrack");
const progressFill  = $("progressFill");
const progressThumb = $("progressThumb");
const timePreview   = $("timePreview");
const speedSel      = $("speedSel");
const fsBtn         = $("fsBtn");
const fsIcon        = $("fsIcon");
const chList        = $("chList");
const chBadge       = $("chBadge");
const chEmpty       = $("chEmpty");
const chMobBtn      = $("chMobBtn");
const chaptersPanel = $("chaptersPanel");
const toastEl       = $("toast");
const ccBtn         = $("ccBtn");

let chapters           = [];
let scrubbing          = false;
let panelVisible       = true;
let activeChapterIndex = -1;
let ccActive           = false;

// ── INIT ──────────────────────────────────────────────────────────
async function init() {
  applyStoredTheme();
  $("homeThemeBtn").addEventListener("click",   toggleTheme);
  $("playerThemeBtn").addEventListener("click", toggleTheme);
  backBtn.addEventListener("click", showHome);

  libraryGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem">Loading library…</p>';
  try {
    VIDEOS = await invoke("scan_videos");
  } catch (err) {
    libraryGrid.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:3rem">Could not load videos: ${err}</p>`;
    return;
  }
  buildLibrary();
}

function applyStoredTheme() {
  if (localStorage.getItem("oscahs-theme") === "dark")
    document.documentElement.setAttribute("data-theme", "dark");
}

// ── LIBRARY ───────────────────────────────────────────────────────
function buildLibrary() {
  if (VIDEOS.length === 0) {
    libraryGrid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem">No videos found. Add .mp4 files to <strong>OSCAHS Dropbox / Oscahs Team / Magicbooking Training</strong>.</p>';
    return;
  }
  libraryGrid.innerHTML = VIDEOS.map((v, i) => `
    <div class="v-card" data-idx="${i}" role="button" tabindex="0" aria-label="Play ${esc(v.title)}">
      <div class="v-card-thumb">
        <video class="thumb-video" muted playsinline preload="none" tabindex="-1"
               data-src="${esc(convertFileSrc(v.path))}"></video>
        <div class="play-circle">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        ${v.chapters && v.chapters.length > 0
          ? `<span class="ch-pill">${v.chapters.length} chapter${v.chapters.length !== 1 ? "s" : ""}</span>`
          : ""}
      </div>
      <div class="v-card-body">
        <div class="v-card-title">${esc(v.title)}</div>
        ${v.description ? `<div class="v-card-desc">${esc(v.description)}</div>` : ""}
      </div>
    </div>
  `).join("");

  libraryGrid.querySelectorAll(".v-card").forEach(card => {
    const open = () => openVideo(+card.dataset.idx);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); } });
  });

  const thumbObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const tv = entry.target.querySelector(".thumb-video");
      if (!tv || tv.src) return;
      tv.src = tv.dataset.src;
      tv.addEventListener("loadedmetadata", () => {
        tv.currentTime = 0.001;
      }, { once: true });
      tv.addEventListener("seeked", () => {
        tv.classList.add("ready");
      }, { once: true });
      thumbObserver.unobserve(entry.target);
    });
  }, { rootMargin: "100px" });

  libraryGrid.querySelectorAll(".v-card").forEach(card => thumbObserver.observe(card));
}

// ── NAVIGATION ────────────────────────────────────────────────────
function showHome() {
  video.pause();
  video.src = "";
  playerView.classList.remove("active");
  homeView.classList.add("active");
  document.title = "Oscahs Training Library";
  window.scrollTo(0, 0);
}

function openVideo(idx) {
  const v = VIDEOS[idx];
  if (!v) return;
  homeView.classList.remove("active");
  playerView.classList.add("active");
  playerTitle.textContent = v.title;
  document.title = `Oscahs Training — ${v.title}`;

  // Reset player state
  video.src = convertFileSrc(v.path);
  speedSel.value = "1";
  video.playbackRate = 1;
  volSlider.value = 1;
  video.volume = 1;
  video.muted = false;
  syncVolIcon();
  resetProgress();
  activeChapterIndex = -1;
  setChapters(v.chapters || []);
  setupSubtitles(v.subtitles || null);

  // Reset mobile panel visibility
  panelVisible = true;
  chaptersPanel.style.display = "";
  chMobBtn.setAttribute("aria-expanded", "true");

  window.scrollTo(0, 0);
  backBtn.focus();
}

// ── PLAYBACK ──────────────────────────────────────────────────────
playBtn.addEventListener("click", togglePlay);
video.addEventListener("click",   togglePlay);
function togglePlay() { video.paused ? video.play() : video.pause(); }
video.addEventListener("play",  () => { iconPlay.style.display = "none"; iconPause.style.display = ""; playBtn.title = "Pause  [Space]"; playBtn.setAttribute("aria-label", "Pause"); });
video.addEventListener("pause", () => { iconPlay.style.display = "";     iconPause.style.display = "none"; playBtn.title = "Play  [Space]"; playBtn.setAttribute("aria-label", "Play"); });
video.addEventListener("ended", () => { syncProgress(); });

volSlider.addEventListener("input", () => { video.volume = +volSlider.value; syncVolIcon(); });
muteBtn.addEventListener("click",   () => { video.muted = !video.muted; syncVolIcon(); });
function syncVolIcon() {
  const off = video.muted || video.volume === 0;
  muteBtn.setAttribute("aria-label", off ? "Unmute" : "Mute");
  muteBtn.title = off ? "Unmute  [M]" : "Mute  [M]";
  volSvg.innerHTML = off
    ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
    : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}

speedSel.addEventListener("change", () => { video.playbackRate = +speedSel.value; });

// ── SUBTITLES ─────────────────────────────────────────────────────
function setupSubtitles(url) {
  // Remove any existing track elements
  Array.from(video.querySelectorAll("track")).forEach(t => video.removeChild(t));
  ccActive = false;
  ccBtn.classList.remove("active");

  if (url) {
    const track = document.createElement("track");
    track.kind    = "subtitles";
    track.src     = url;
    track.default = false;
    video.appendChild(track);
    // Ensure hidden until user enables
    video.addEventListener("loadedmetadata", () => {
      if (video.textTracks[0]) video.textTracks[0].mode = "hidden";
    }, { once: true });
    ccBtn.style.display = "";
    ccBtn.title = "Subtitles on  [C]";
    ccBtn.setAttribute("aria-label", "Enable subtitles");
    ccBtn.setAttribute("aria-pressed", "false");
  } else {
    ccBtn.style.display = "none";
  }
}

ccBtn.addEventListener("click", toggleCaptions);
function toggleCaptions() {
  if (!video.textTracks.length) return;
  ccActive = !ccActive;
  video.textTracks[0].mode = ccActive ? "showing" : "hidden";
  ccBtn.classList.toggle("active", ccActive);
  ccBtn.setAttribute("aria-pressed", ccActive);
  ccBtn.title = ccActive ? "Subtitles off  [C]" : "Subtitles on  [C]";
  ccBtn.setAttribute("aria-label", ccActive ? "Disable subtitles" : "Enable subtitles");
}

// Fullscreen
fsBtn.addEventListener("click", toggleFs);
function toggleFs() {
  if (!document.fullscreenElement) $("videoPanel").requestFullscreen?.();
  else document.exitFullscreen?.();
}
document.addEventListener("fullscreenchange", () => {
  const on = !!document.fullscreenElement;
  fsIcon.innerHTML = on
    ? '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
    : '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
  fsBtn.setAttribute("aria-label", on ? "Exit fullscreen" : "Enter fullscreen");
  fsBtn.title = on ? "Exit fullscreen  [F]" : "Fullscreen  [F]";
});

// ── PROGRESS ──────────────────────────────────────────────────────
video.addEventListener("loadedmetadata", () => { drawTicks(); syncTime(); });
video.addEventListener("timeupdate",     () => { if (!scrubbing) { syncProgress(); syncTime(); updateActiveChapter(); } });
video.addEventListener("seeking",        () => { $("videoLoader").classList.add("visible"); });
video.addEventListener("seeked",         () => { $("videoLoader").classList.remove("visible"); });
video.addEventListener("waiting",        () => { $("videoLoader").classList.add("visible"); });
video.addEventListener("playing",        () => { $("videoLoader").classList.remove("visible"); });

function syncProgress() {
  const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
  progressFill.style.width = pct + "%";
  progressThumb.style.left = pct + "%";
}
function resetProgress() {
  progressFill.style.width  = "0%";
  progressThumb.style.left  = "0%";
  timeDsp.textContent = "0:00 / 0:00";
}
function syncTime() {
  timeDsp.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration || 0)}`;
}
function fmt(s) {
  if (!s || isNaN(s)) return "0:00";
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`
    : `${m}:${String(sec).padStart(2,"0")}`;
}

// Progress hover preview
progressWrap.addEventListener("mousemove", e => {
  const r = progressTrack.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  timePreview.style.left = (pct * 100) + "%";
  timePreview.textContent = fmt(pct * (video.duration || 0));
});

// Scrub
progressWrap.addEventListener("mousedown",  e => startScrub(e));
progressWrap.addEventListener("touchstart", e => startScrub(e), { passive: true });
function startScrub(e) {
  scrubbing = true;
  progressWrap.classList.add("dragging");
  updateScrubVisual(e);
  const move = ev => updateScrubVisual(ev);
  const up   = ev => {
    scrubbing = false;
    progressWrap.classList.remove("dragging");
    fastSeek(pctToTime(ev));
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup",   up);
    document.removeEventListener("touchmove", move);
    document.removeEventListener("touchend",  up);
  };
  document.addEventListener("mousemove", move);
  document.addEventListener("mouseup",   up);
  document.addEventListener("touchmove", move, { passive: true });
  document.addEventListener("touchend",  up);
}
function pctToTime(e) {
  const r  = progressTrack.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (cx - r.left) / r.width)) * (video.duration || 0);
}
function updateScrubVisual(e) {
  const r   = progressTrack.getBoundingClientRect();
  const cx  = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (cx - r.left) / r.width));
  progressFill.style.width = (pct * 100) + "%";
  progressThumb.style.left  = (pct * 100) + "%";
  timeDsp.textContent = `${fmt(pct * (video.duration || 0))} / ${fmt(video.duration || 0)}`;
}
function fastSeek(t) {
  if (isNaN(t)) return;
  video.currentTime = t;
}

// ── CHAPTERS ──────────────────────────────────────────────────────
function setChapters(data) {
  chapters = [...data].sort((a, b) => a.time - b.time);
  chBadge.textContent = chapters.length;
  renderChapterList();
  drawTicks();
}
function renderChapterList() {
  if (chapters.length === 0) {
    chList.innerHTML = "";
    chList.appendChild(chEmpty);
    return;
  }
  chEmpty.remove?.();
  chList.innerHTML = chapters.map((ch, i) => `
    <div class="ch-item" data-i="${i}" data-t="${ch.time}">
      <span class="ch-n">${i + 1}</span>
      <div class="ch-body">
        <div class="ch-name">${esc(ch.title)}</div>
        <div class="ch-ts">${fmt(ch.time)}</div>
      </div>
      <svg class="ch-play-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
  `).join("");
  chList.querySelectorAll(".ch-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = +el.dataset.i;
      activeChapterIndex = idx;
      chList.querySelectorAll(".ch-item").forEach((item, i) => item.classList.toggle("active", i === idx));
      el.scrollIntoView({ block: "nearest", behavior: "smooth" });
      fastSeek(+el.dataset.t);
    });
  });
  updateActiveChapter(true);
}
function drawTicks() {
  progressTrack.querySelectorAll(".ch-tick").forEach(t => t.remove());
  if (!video.duration || !chapters.length) return;
  chapters.forEach(ch => {
    if (!ch.time) return;
    const pct = (ch.time / video.duration) * 100;
    const tick = document.createElement("div");
    tick.className = "ch-tick";
    tick.style.left = pct + "%";
    tick.innerHTML = `<span class="ch-tick-tip">${esc(ch.title)}</span>`;
    progressTrack.appendChild(tick);
  });
}
function updateActiveChapter(force = false) {
  if (!chapters.length) return;
  const t = video.currentTime;
  let ai = 0;
  for (let i = 0; i < chapters.length; i++) { if (chapters[i].time <= t) ai = i; }
  
  if (ai === activeChapterIndex && !force) return;
  activeChapterIndex = ai;

  chList.querySelectorAll(".ch-item").forEach((el, i) => el.classList.toggle("active", i === ai));
  chList.querySelector(".ch-item.active")?.scrollIntoView({ block: "nearest", behavior: "smooth" });
}

// ── CHAPTER FILE PARSING ──────────────────────────────────────────
function parseChapterFile(text, filename) {
  const ext = (filename.split(".").pop() || "").toLowerCase();

  // TTX / OGM
  if (ext === "ttx" || /CHAPTER\d+=\d/i.test(text)) {
    const times = {}, names = {};
    text.split(/\r?\n/).forEach(line => {
      let m;
      if ((m = line.match(/^CHAPTER(\d+)=(\S+)/i)))   times[+m[1]] = parseTC(m[2]);
      if ((m = line.match(/^CHAPTER(\d+)NAME=(.+)/i))) names[+m[1]] = m[2].trim();
    });
    return Object.keys(times)
      .map(k => ({ time: times[k], title: names[k] || `Chapter ${k}` }))
      .filter(c => c.time !== null);
  }

  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return [];

  // Delimiter-separated (CSV / TSV / pipe)
  const delimiters = [",", "\t", "|", ";"];
  const sample = lines.find(l => !/^(time|timestamp|chapter|title)/i.test(l)) || lines[0];
  const delim  = delimiters.find(d => sample.includes(d));
  if (delim) {
    const first   = lines[0].split(delim).map(c => c.replace(/^"|"$/g,"").trim());
    const startAt = (parseTC(first[0]) === null && parseTC(first[1]) === null) ? 1 : 0;
    const parsed  = [];
    for (let i = startAt; i < lines.length; i++) {
      const cols = lines[i].split(delim).map(c => c.replace(/^"|"$/g,"").trim());
      if (cols.length < 2) continue;
      const t0 = parseTC(cols[0]), t1 = parseTC(cols[1]);
      if (t0 !== null && cols[1]) { parsed.push({ time: t0, title: cols[1] }); continue; }
      if (t1 !== null && cols[0]) { parsed.push({ time: t1, title: cols[0] }); continue; }
    }
    if (parsed.length > 0) return parsed;
  }

  // Plain text — find any line containing a recognisable timecode
  const TC_RE = /(?:^|[\s([\-\u2013|])(\d{1,2}:\d{2}(?::\d{2})?(?:[.,]\d+)?)(?:$|[\s)\]|\u2013\-])/;
  const parsed = [];
  for (const line of lines) {
    const m = line.match(TC_RE);
    if (!m) continue;
    const t = parseTC(m[1]);
    if (t === null) continue;
    const title = line.replace(m[0], " ").replace(/^[\s\-\u2013|:()[\]]+|[\s\-\u2013|:()[\]]+$/g, "").trim();
    if (title) parsed.push({ time: t, title });
  }
  return parsed;
}

function parseTC(s) {
  if (!s) return null;
  s = String(s).trim().replace(",", ".");
  const parts = s.split(":");
  if (parts.length === 3) return +parts[0] * 3600 + +parts[1] * 60 + parseFloat(parts[2]);
  if (parts.length === 2) return +parts[0] * 60 + parseFloat(parts[1]);
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}

// Prevent accidental file drops anywhere on the page
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop",     e => e.preventDefault());

// ── MOBILE CHAPTERS TOGGLE ────────────────────────────────────────
chMobBtn.addEventListener("click", () => {
  panelVisible = !panelVisible;
  chaptersPanel.style.display = panelVisible ? "" : "none";
  chMobBtn.setAttribute("aria-expanded", panelVisible);
});

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if (["INPUT","SELECT","TEXTAREA"].includes(e.target.tagName)) return;
  if (!playerView.classList.contains("active")) return;
  const inChaptersList = chList.contains(e.target) || e.target === chList;
  switch(e.key) {
    case " ": case "k": e.preventDefault(); togglePlay(); break;
    case "ArrowRight": e.preventDefault(); video.currentTime = Math.min((video.currentTime||0)+5, video.duration); break;
    case "ArrowLeft":  e.preventDefault(); video.currentTime = Math.max((video.currentTime||0)-5, 0); break;
    case "ArrowUp":    if (!inChaptersList) { e.preventDefault(); video.volume = Math.min(video.volume+.1,1); volSlider.value=video.volume; syncVolIcon(); } break;
    case "ArrowDown":  if (!inChaptersList) { e.preventDefault(); video.volume = Math.max(video.volume-.1,0); volSlider.value=video.volume; syncVolIcon(); } break;
    case "m": case "M": video.muted=!video.muted; syncVolIcon(); break;
    case "c": case "C": if (ccBtn.style.display !== "none") toggleCaptions(); break;
    case "f": case "F": toggleFs(); break;
    case "Escape": if (!document.fullscreenElement) showHome(); break;
  }
});

// ── DARK MODE ─────────────────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
  localStorage.setItem("oscahs-theme", dark ? "light" : "dark");
}

// ── TOAST ─────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, err=false) {
  toastEl.textContent = msg;
  toastEl.className = "toast" + (err ? " error" : "");
  clearTimeout(toastTimer);
  requestAnimationFrame(() => requestAnimationFrame(() => toastEl.classList.add("visible")));
  toastTimer = setTimeout(() => toastEl.classList.remove("visible"), 3000);
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── START ─────────────────────────────────────────────────────────
init();
</script>
